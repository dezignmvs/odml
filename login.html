<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odamala Census 2026 - Login</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Clash Grotesk"', '-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'sans-serif'],
          },
          colors: {
            brand: {
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>
  <!-- Fontshare Clash Grotesk Link -->
  <link href="https://api.fontshare.com/css?f[]=clash-grotesk@300,400,500,600,700&display=swap" rel="stylesheet">
  <!-- FontAwesome for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Styles -->
  <link rel="stylesheet" href="login.css">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body class="bg-[#fafafa] min-h-screen flex flex-col justify-between font-sans relative overflow-hidden">

  <!-- Background decorative blur elements -->
  <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-indigo-100 blur-[100px] opacity-70 pointer-events-none"></div>
  <div class="absolute bottom-10 right-10 w-80 h-80 rounded-full bg-emerald-50 blur-[80px] opacity-50 pointer-events-none"></div>

  <!-- Header logo -->
  <header class="py-6 px-8 flex justify-center z-10">
    <div class="text-center">
      <h2 class="text-md font-semibold text-zinc-900 tracking-tight flex items-center justify-center gap-1.5">
        <i class="fa-solid fa-house-chimney text-brand-600 text-xs"></i>
        <span>Odamala Mahallu Census 2026</span>
      </h2>
    </div>
  </header>

  <!-- Login Main Container -->
  <main class="w-full max-w-md mx-auto p-4 z-10 flex-grow flex items-center justify-center">
    <div class="bg-white border border-zinc-200 rounded-3xl p-7 md:p-8 w-full shadow-xl transition-all duration-300 relative overflow-hidden" id="loginCard">
      <!-- Top banner line accent -->
      <div class="absolute top-0 left-0 right-0 h-1 bg-brand-600"></div>
      
      <!-- Error message container -->
      <div id="errorAlert" class="hidden flex items-center gap-2 p-3 bg-red-50 border border-red-200 text-red-700 text-xs rounded-xl mb-5 font-semibold transition uppercase tracking-wider">
        <i class="fa-solid fa-triangle-exclamation text-[10px]"></i>
        <span id="errorMsg">Invalid credentials</span>
      </div>

      <!-- Credentials Section -->
      <div id="credentialsSection" class="space-y-4">
        <div class="text-center space-y-2 mb-6">
          <div class="w-12 h-12 rounded-2xl bg-indigo-50 border border-indigo-100 flex items-center justify-center text-brand-600 mx-auto">
            <i class="fa-solid fa-building-shield text-lg"></i>
          </div>
          <h3 class="text-lg font-bold text-zinc-900 tracking-tight">Staff Portal Login</h3>
          <p class="text-xs text-zinc-400 font-medium">Verify credentials to access the registry database.</p>
        </div>

        <form id="loginForm" class="space-y-4">
          <!-- Username input -->
          <div>
            <label for="username" class="block text-[10px] font-semibold text-zinc-500 mb-1.5 uppercase tracking-wider">Username</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-zinc-400">
                <i class="fa-solid fa-user text-xs"></i>
              </span>
              <input type="text" id="username" placeholder="Type username" required
                class="w-full pl-9 pr-4 py-2.5 bg-white border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-600/10 focus:border-brand-600 text-zinc-900 text-xs shadow-sm transition">
            </div>
          </div>

          <!-- Password input -->
          <div>
            <label for="password" class="block text-[10px] font-semibold text-zinc-500 mb-1.5 uppercase tracking-wider">Password</label>
            <div class="relative">
              <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-zinc-400">
                <i class="fa-solid fa-lock text-xs"></i>
              </span>
              <input type="password" id="password" placeholder="••••••••" required
                class="w-full pl-9 pr-4 py-2.5 bg-white border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-600/10 focus:border-brand-600 text-zinc-900 text-xs shadow-sm transition">
            </div>
          </div>

          <!-- Login Button -->
          <button type="submit"
            class="w-full inline-flex justify-center items-center gap-1.5 px-4 py-2.5 bg-zinc-900 hover:bg-zinc-800 text-white text-xs font-semibold rounded-xl transition duration-150 shadow-sm mt-2">
            <span>Authorize Access</span>
            <i class="fa-solid fa-shield-halved text-[10px]"></i>
          </button>
        </form>
      </div>

      <!-- Passcode Section (hidden by default) -->
      <div id="passcodeSection" class="hidden space-y-4">
        <div class="text-center space-y-2 mb-6">
          <div class="w-12 h-12 rounded-2xl bg-amber-50 border border-amber-100 flex items-center justify-center text-amber-600 mx-auto">
            <i class="fa-solid fa-key text-lg"></i>
          </div>
          <h3 class="text-lg font-bold text-zinc-900 tracking-tight">Security Verification</h3>
          <p class="text-xs text-zinc-400 font-medium">Enter the 6-digit security passcode to continue.</p>
        </div>

        <form id="passcodeForm" class="space-y-5">
          <!-- Passcode digits input -->
          <div class="flex justify-center gap-3 my-4">
            <input type="password" id="p_digit_1" maxlength="1" required pattern="[0-9]" inputmode="numeric"
              class="w-12 h-12 text-center text-xl font-bold border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-600/10 focus:border-brand-600 text-zinc-900 shadow-sm transition">
            <input type="password" id="p_digit_2" maxlength="1" required pattern="[0-9]" inputmode="numeric"
              class="w-12 h-12 text-center text-xl font-bold border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-600/10 focus:border-brand-600 text-zinc-900 shadow-sm transition">
            <input type="password" id="p_digit_3" maxlength="1" required pattern="[0-9]" inputmode="numeric"
              class="w-12 h-12 text-center text-xl font-bold border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-600/10 focus:border-brand-600 text-zinc-900 shadow-sm transition">
            <input type="password" id="p_digit_4" maxlength="1" required pattern="[0-9]" inputmode="numeric"
              class="w-12 h-12 text-center text-xl font-bold border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-600/10 focus:border-brand-600 text-zinc-900 shadow-sm transition">
            <input type="password" id="p_digit_5" maxlength="1" required pattern="[0-9]" inputmode="numeric"
              class="w-12 h-12 text-center text-xl font-bold border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-600/10 focus:border-brand-600 text-zinc-900 shadow-sm transition">
            <input type="password" id="p_digit_6" maxlength="1" required pattern="[0-9]" inputmode="numeric"
              class="w-12 h-12 text-center text-xl font-bold border border-zinc-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-600/10 focus:border-brand-600 text-zinc-900 shadow-sm transition">
          </div>

          <!-- Verify Button -->
          <button type="submit"
            class="w-full inline-flex justify-center items-center gap-1.5 px-4 py-2.5 bg-zinc-900 hover:bg-zinc-800 text-white text-xs font-semibold rounded-xl transition duration-150 shadow-sm">
            <span>Verify & Open Database</span>
            <i class="fa-solid fa-arrow-right-to-bracket text-[10px]"></i>
          </button>

          <!-- Back to Credentials -->
          <div class="text-center pt-2">
            <button type="button" id="backToCredentialsBtn" class="inline-flex items-center gap-1 text-[10px] font-semibold text-zinc-400 hover:text-zinc-650 uppercase tracking-widest transition">
              <i class="fa-solid fa-arrow-left text-[9px] mr-1"></i>
              <span>Back to Credentials</span>
            </button>
          </div>
        </form>
      </div>

    </div>
  </main>

  <!-- Footer link back to index -->
  <footer class="py-6 px-4 text-center z-10">
    <a href="index.html" class="inline-flex items-center gap-1 text-[10px] font-semibold text-zinc-400 hover:text-zinc-650 uppercase tracking-widest transition">
      <i class="fa-solid fa-arrow-left text-[9px]"></i>
      <span>Back to Survey Form</span>
    </a>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Parse URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const redirect = urlParams.get('redirect') || 'index.html';
      const step = urlParams.get('step');

      // Clear sessions ONLY if accessing login page directly (no redirect query param)
      if (!urlParams.has('redirect')) {
        sessionStorage.removeItem('census_logged_in');
        sessionStorage.removeItem('census_passcode_verified');
      }

      const loginCard = document.getElementById('loginCard');
      const errorAlert = document.getElementById('errorAlert');
      const errorMsg = document.getElementById('errorMsg');

      const credentialsSection = document.getElementById('credentialsSection');
      const loginForm = document.getElementById('loginForm');

      const passcodeSection = document.getElementById('passcodeSection');
      const passcodeForm = document.getElementById('passcodeForm');
      const backToCredentialsBtn = document.getElementById('backToCredentialsBtn');

      const pDigit1 = document.getElementById('p_digit_1');
      const pDigit2 = document.getElementById('p_digit_2');
      const pDigit3 = document.getElementById('p_digit_3');
      const pDigit4 = document.getElementById('p_digit_4');
      const pDigit5 = document.getElementById('p_digit_5');
      const pDigit6 = document.getElementById('p_digit_6');
      const pDigits = [pDigit1, pDigit2, pDigit3, pDigit4, pDigit5, pDigit6];

      // If user is already logged in (credentials ok) and just needs passcode
      if (step === 'passcode' && sessionStorage.getItem('census_logged_in') === 'true') {
        credentialsSection.classList.add('hidden');
        passcodeSection.classList.remove('hidden');
        pDigit1.focus();
      }

      // Handle credentials form submit
      loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const usernameVal = document.getElementById('username').value.trim();
        const passwordVal = document.getElementById('password').value.trim();

        if (usernameVal === 'aslan' && passwordVal === '81119') {
          // Hide error alert if any
          errorAlert.classList.add('hidden');
          sessionStorage.setItem('census_logged_in', 'true');
          
          if (redirect === 'data.html') {
            // Animate transition to passcode step
            credentialsSection.classList.add('hidden');
            passcodeSection.classList.remove('hidden');
            // Focus first passcode digit input
            pDigit1.focus();
          } else {
            // Go to index.html directly
            window.location.href = redirect;
          }
        } else {
          // Trigger shake animation on card
          loginCard.classList.remove('shake');
          void loginCard.offsetWidth; // Trigger reflow to restart animation
          loginCard.classList.add('shake');
          
          // Display alert details
          errorAlert.classList.remove('hidden');
          errorMsg.textContent = 'Incorrect username or password';
        }
      });

      // Passcode auto-focus and navigation logic
      pDigits.forEach((input, index) => {
        // Automatically focus next input on entry
        input.addEventListener('input', (e) => {
          if (e.target.value.length === 1 && index < pDigits.length - 1) {
            pDigits[index + 1].focus();
          }
        });

        // Navigate back on backspace
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
            pDigits[index - 1].focus();
          }
        });
      });

      // Handle passcode submit
      passcodeForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const passcode = pDigits.map(input => input.value).join('');

        if (passcode === '340340') {
          sessionStorage.setItem('census_passcode_verified', 'true');
          window.location.href = redirect;
        } else {
          // Shake card
          loginCard.classList.remove('shake');
          void loginCard.offsetWidth;
          loginCard.classList.add('shake');

          // Show passcode error alert
          errorAlert.classList.remove('hidden');
          errorMsg.textContent = 'Incorrect passcode';

          // Reset code fields and focus first one
          pDigits.forEach(input => input.value = '');
          pDigit1.focus();
        }
      });

      // Back to credentials button logic
      backToCredentialsBtn.addEventListener('click', () => {
        errorAlert.classList.add('hidden');
        passcodeSection.classList.add('hidden');
        credentialsSection.classList.remove('hidden');
        
        // Reset passcode values
        pDigits.forEach(input => input.value = '');
      });
    });
  </script>
</body>
</html>
